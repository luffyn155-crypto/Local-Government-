function Chatbot() {
  const [messages, setMessages] = useState([
    { from: "bot", text: "नमस्ते! म नेपाल नागरिक साथी हुँ। तपाईंलाई के मद्दत गर्न सक्छु? नागरिकता, राहदानी, IPO, Demat, आपतकाल जस्ता विषयमा सोध्नुहोस्।" }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const getReply = async (text) => {
    const lower = text.toLowerCase();
    for (const [key, val] of Object.entries(CHATBOT_KB)) {
      if (lower.includes(key.toLowerCase())) return val;
    }
    // NOTE: There is no live AI backend wired up in this static version.
    // Plug your own API endpoint here if you want live AI answers for
    // questions outside the built-in knowledge base below.
    return CHATBOT_KB.default;
  };

  const send = async () => {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(m => [...m, { from: "user", text: userMsg }]);
    setLoading(true);
    const reply = await getReply(userMsg);
    setLoading(false);
    setMessages(m => [...m, { from: "bot", text: reply }]);
  };

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "1.5rem" }}>
      <div style={{ ...card(), height: 420, overflowY: "auto", display: "flex", flexDirection: "column", gap: "0.75rem", padding: "1.25rem" }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.from === "user" ? "flex-end" : "flex-start" }}>
            <div style={{
              maxWidth: "80%", padding: "0.7rem 1rem", borderRadius: m.from === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
              background: m.from === "user" ? `linear-gradient(135deg,${COLORS.blue},${COLORS.blueSoft})` : "#f1f5fb",
              color: m.from === "user" ? "white" : "#1a1a1a", lineHeight: 1.6, fontSize: "0.95rem"
            }}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", gap: 6, padding: "0.7rem 1rem", background: "#f1f5fb", borderRadius: "18px 18px 18px 4px", width: 60 }}>
            {[0, 0.2, 0.4].map((d, i) => (
              <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.blue, animation: `bounce 1s ${d}s infinite` }} />
            ))}
          </div>
        )}
        <div ref={endRef} />
      </div>
      <div style={{ display: "flex", gap: "0.75rem", marginTop: "1rem" }}>
        <input
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="यहाँ प्रश्न लेख्नुहोस्..."
          style={{ flex: 1, padding: "0.8rem 1.2rem", borderRadius: 12, border: `1.5px solid ${COLORS.slate}`, fontSize: "0.95rem", outline: "none" }}
        />
        <button onClick={send} style={{ ...btnStyle(COLORS.blue), padding: "0.8rem 1.5rem" }}>पठाउनुस् →</button>
      </div>
      <p style={{ fontSize: "0.75rem", color: "#6B7FA3", textAlign: "center", marginTop: "0.5rem" }}>
        ⚠️ यो एक साधारण सहायक हो। महत्त्वपूर्ण निर्णयको लागि आधिकारिक स्रोत प्रयोग गर्नुहोस्।
      </p>
    </div>
  );
}
