function Chatbot() {
  const [messages, setMessages] = useState([
    { from: "bot", text: "नमस्ते! म नेपाल नागरिक साथी हुँ। तपाईंलाई के मद्दत गर्न सक्छु? नागरिकता, राहदानी, IPO, Demat, आपतकाल जस्ता विषयमा सोध्नुहोस्।" }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const getReply = async (text) => {
    const lower = text.toLowerCase();
    for (const [key, val] of Object.entries(CHATBOT_KB)) {
      if (lower.includes(key.toLowerCase())) return val;
    }
    // NOTE: There is no live AI backend wired up in this static version.
    // Plug your own API endpoint here if you want live AI answers for
    // questions outside the built-in knowledge base below.
    return CHATBOT_KB.default;
  };

  const send = async () => {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(m => [...m, { from: "user", text: userMsg }]);
    setLoading(true);
    const reply = await getReply(userMsg);
    setLoading(false);
    setMessages(m => [...m, { from: "bot", text: reply }]);
  };

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "1.5rem" }}>
      <div style={{ ...card(), height: 420, overflowY: "auto", display: "flex", flexDirection: "column", gap: "0.75rem", padding: "1.25rem" }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.from === "user" ? "flex-end" : "flex-start" }}>
            <div style={{
              maxWidth: "80%", padding: "0.7rem 1rem", borderRadius: m.from === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
              background: m.from === "user" ? `linear-gradient(135deg,${COLORS.blue},${COLORS.blueSoft})` : "#f1f5fb",
              color: m.from === "user" ? "white" : "#1a1a1a", lineHeight: 1.6, fontSize: "0.95rem"
            }}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", gap: 6, padding: "0.7rem 1rem", background: "#f1f5fb", borderRadius: "18px 18px 18px 4px", width: 60 }}>
            {[0, 0.2, 0.4].map((d, i) => (
              <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.blue, animation: `bounce 1s ${d}s infinite` }} />
            ))}
          </div>
        )}
        <div ref={endRef} />
      </div>
      <div style={{ display: "flex", gap: "0.75rem", marginTop: "1rem" }}>
        <input
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="यहाँ प्रश्न लेख्नुहोस्..."
          style={{ flex: 1, padding: "0.8rem 1.2rem", borderRadius: 12, border: `1.5px solid ${COLORS.slate}`, fontSize: "0.95rem", outline: "none" }}
        />
        <button onClick={send} style={{ ...btnStyle(COLORS.blue), padding: "0.8rem 1.5rem" }}>पठाउनुस् →</button>
      </div>
      <p style={{ fontSize: "0.75rem", color: "#6B7FA3", textAlign: "center", marginTop: "0.5rem" }}>
        ⚠️ यो एक साधारण सहायक हो। महत्त्वपूर्ण निर्णयको लागि आधिकारिक स्रोत प्रयोग गर्नुहोस्।
      </p>
    </div>
  );
}

            style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "2px", minWidth: 60, padding: "0.3rem 0.4rem", border: "none", background: "transparent", cursor: "pointer", color: page === n.id ? COLORS.blue : "#6B7FA3", fontWeight: page === n.id ? 700 : 400, fontSize: "0.6rem", transition: "color 0.2s" }}>
            <span style={{ fontSize: "1.25rem" }}>{n.icon}</span>
            <span style={{ whiteSpace: "nowrap" }}>{n.label.split(" ")[0]}</span>
          </button>
        ))}
      </nav>

      <main style={{ maxWidth: 1100, margin: "0 auto", paddingBottom: 100 }}>
        {renderPage()}
      </main>

      <footer style={{ background: dark ? "#060e1f" : COLORS.navy, color: "#c8d8f8", padding: "2rem 1.5rem", textAlign: "center", paddingBottom: "6rem" }}>
        <div style={{ maxWidth: 960, margin: "0 auto" }}>
          <div style={{ fontSize: "1.5rem", marginBottom: "0.5rem" }}>🇳🇵</div>
          <div style={{ fontWeight: 800, fontSize: "1.1rem", marginBottom: "0.5rem", color: "white" }}>नेपाल नागरिक साथी</div>
          <p style={{ fontSize: "0.85rem", opacity: 0.7, maxWidth: 500, margin: "0 auto 1rem" }}>
            यो वेबसाइट नागरिक जानकारीको लागि मात्र हो। सबै शुल्क, प्रक्रिया, र कागजातहरू आधिकारिक स्रोतबाट प्रमाणित गर्नुहोस्।
          </p>
          <div style={{ display: "flex", gap: "1rem", justifyContent: "center", flexWrap: "wrap", fontSize: "0.85rem", opacity: 0.7 }}>
            <span>© २०८१ नेपाल नागरिक साथी</span>
            <span>•</span>
            <span>जानकारी नमूना मात्र — आधिकारिक स्रोत जाँच्नुहोस्</span>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<NepalNagarikSathi />);
</script>

<script>
  (function () {
    function showError(title, err) {
      var root = document.getElementById('root');
      var msg = (err && (err.message || err.toString())) || 'Unknown error';
      var stack = (err && err.stack) ? '\n\n' + err.stack : '';
      root.innerHTML = '<div style="font-family:monospace;white-space:pre-wrap;padding:2rem;color:#991b1b;background:#fee2e2;line-height:1.5;">'
        + '⚠️ ' + title + '\n\n' + msg + stack + '</div>';
      console.error(title, err);
    }
    try {
      if (typeof Babel === 'undefined') {
        throw new Error('Babel did not load (CDN script blocked or failed).');
      }
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
        throw new Error('React/ReactDOM did not load (CDN script blocked or failed).');
      }
      var source = document.getElementById('app-source').textContent;
      var output;
      try {
        output = Babel.transform(source, { presets: ['react'] }).code;
      } catch (transformErr) {
        showError('JSX/Babel transform error:', transformErr);
        return;
      }
      var script = document.createElement('script');
      script.textContent = output;
      script.onerror = function (e) { showError('Script execution error:', e); };
      document.body.appendChild(script);
    } catch (err) {
      showError('Startup error:', err);
    }
  })();
</script>
